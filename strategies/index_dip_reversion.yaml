  RANGE:             {idx_dip_pct_min: 1.0, idx_atr_mult: 3.0, validated: false, oos_ref: delivery_cost_fail_pf1.17}
  STRONG_TREND_DOWN: {enabled: false}
  QUIET:             {enabled: false}
  default:           {enabled: false}
regime_fit:
  STRONG_TREND_UP:   {pf: 1.17, trades: 184, source: walkforward_bluechip_delivery}
  RANGE:             {pf: 1.17, trades: 184, source: walkforward_bluechip_delivery}
