# 1.29) but FAILED under real DELIVERY (CNC) costs: OOS PF 1.17 (below the 1.2 bar).
# validated:false => not traded. Its high turnover (184 trades) makes it especially
# cost-sensitive — re-test if entries can be made more selective.
